<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | CS Vertex</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #030303;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 400px;
      padding: 20px;
    }
    h1 {
      color: #E8440A;
      font-size: 28px;
      margin-bottom: 10px;
    }
    p {
      color: #bbbbbb;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 30px;
    }
    .retry-btn {
      background-color: #E8440A;
      color: #ffffff;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .retry-btn:hover {
      background-color: #ff5722;
    }
    .logo {
      width: 120px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/assets/logo-nav.png" alt="CS Vertex Logo" class="logo" />
    <h1>You are offline</h1>
    <p>It seems your device has lost its internet connection. Please check your network and try again.</p>
    <button class="retry-btn" onclick="window.location.reload()">Retry Connection</button>
  </div>

  <script>
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
